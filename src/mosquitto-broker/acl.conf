# =============================================================================
# Archivo:      acl.conf
# Proyecto:     Brazo Robótico Pick & Place — Sistema v5.0
# Autor:        Francisco Bevilacqua
# Fecha:        2026-06-19
# Versión:      1.0.0
# Descripción:  Lista de Control de Acceso (ACL) por usuario y topic.
#               Aplica el principio de mínimo privilegio: cada
#               cliente MQTT solo puede hacer exactamente lo que su rol
#               necesita, ni más ni menos.
#
# Modelo de amenaza que esta ACL mitiga:
#   Sin ACL, cualquier cliente autenticado (ej. esp32) podría publicar en
#   robot/cmd y enviarse comandos a sí mismo, o un cliente gui_operator
#   comprometido podría intentar publicar eventos falsos en robot/log
#   simulando ser el ESP32 (spoofing de telemetría).
#
# Sintaxis Mosquitto:
#   user <username>      → bloque de reglas para ese usuario
#   topic read <topic>   → solo puede suscribirse (recibir) ese topic
#   topic write <topic>  → solo puede publicar en ese topic
#   topic readwrite <t>  → ambos (no se usa aquí, se prefiere explicitar)
# =============================================================================


# -----------------------------------------------------------------------------
# Usuario: esp32
# Rol: firmware del brazo robótico (único dispositivo de campo)
# Justificación: el ESP32 es la fuente de verdad del hardware. Solo debe
# poder publicar telemetría/eventos (robot/log) y recibir comandos
# (robot/cmd) — nunca publicar comandos ni leer su propia telemetría
# de vuelta (no la necesita).
# -----------------------------------------------------------------------------
user esp32
topic write robot/log
topic read  robot/cmd


# -----------------------------------------------------------------------------
# Usuario: gui_operator
# Rol: panel de control web (operador humano autenticado vía JWT en Fase 3)
# Justificación: la GUI necesita ver telemetría (robot/log) y enviar
# comandos (robot/cmd) — pero nunca debe poder publicar eventos falsos
# en robot/log haciéndose pasar por el ESP32.
# -----------------------------------------------------------------------------
user gui_operator
topic read  robot/log
topic write robot/cmd


# -----------------------------------------------------------------------------
# [SEC] Comportamiento por defecto: DENEGAR todo lo no listado explícitamente.
# Mosquitto aplica esto automáticamente cuando existe un acl_file: cualquier
# topic no mencionado para un usuario queda bloqueado.
# -----------------------------------------------------------------------------
