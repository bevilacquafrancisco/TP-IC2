# mosquitto.conf — Brazo Robótico Pick & Place v5.0
# Versión 1.2.0 — compatible con Mosquitto 2.1.2 en Windows

# -----------------------------------------------------------------------------
# LISTENER 1 — TCP para el ESP32 (puerto 1883)
# -----------------------------------------------------------------------------
listener 1883
protocol mqtt

# -----------------------------------------------------------------------------
# LISTENER 2 — WebSocket para la GUI (puerto 9001)
# -----------------------------------------------------------------------------
listener 9001
protocol websockets

# -----------------------------------------------------------------------------
# AUTENTICACIÓN GLOBAL (aplica a ambos listeners sin per_listener_settings)
# -----------------------------------------------------------------------------
allow_anonymous false
password_file C:/mosquitto-broker/passwd
acl_file C:/mosquitto-broker/acl.conf

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_dest file C:/mosquitto-broker/logs/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# -----------------------------------------------------------------------------
# PERSISTENCIA
# -----------------------------------------------------------------------------
persistence true
persistence_location C:/mosquitto-broker/data/
autosave_interval 60

# -----------------------------------------------------------------------------
# KEEPALIVE
# -----------------------------------------------------------------------------
max_keepalive 120