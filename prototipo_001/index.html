<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Robot IC2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🤖 Brazo Robótico - Proyecto IC2</h1>
    <p id="connection-status" class="status">Desconectado...</p>

    <div class="container">
        <div class="card">
            <h2>🎮 Controles</h2>
            
            <div class="servo-control">
                <label>Base (Servo 1): <span id="val1">90</span>°</label>
                <input type="range" id="slider1" min="0" max="180" value="90">
            </div>
            
            <div class="servo-control">
                <label>Hombro (Servo 2): <span id="val2">90</span>°</label>
                <input type="range" id="slider2" min="0" max="180" value="90">
            </div>
            
            <div class="servo-control">
                <label>Codo (Servo 3): <span id="val3">90</span>°</label>
                <input type="range" id="slider3" min="0" max="180" value="90">
            </div>

            <div class="servo-control">
                <label>Pinza (Servo 4): <span id="val4">90</span>°</label>
                <input type="range" id="slider4" min="0" max="180" value="90">
            </div>

            <hr>
            <h3>Movimientos Predefinidos</h3>
            <button id="btn-abrir-pinza">Abrir Pinza</button>
            <button id="btn-cerrar-pinza">Cerrar Pinza</button>
            <button id="btn-home">Home 🏠</button>
        </div>

        <div class="card">
            <h2>📡 Telemetría (Datos recibidos)</h2>
            <div id="log">Esperando datos del ESP32...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
